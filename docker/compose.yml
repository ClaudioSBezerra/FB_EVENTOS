# FB_EVENTOS - Local development stack (Phase 0, Plan 03).
#
# Brings up Postgres 16 + MinIO + Mailpit on localhost for local dev and for
# the Vitest RLS integration tests in tests/db/.
#
# Job queue: intentionally Postgres-only. Graphile-Worker uses Postgres for
# job storage (Plan 06 ADR-001) - no in-memory cache container is required
# at any phase. See ADR-0001 in docs/adr/ (Plan 06) for the rationale.
#
# Image tags are pinned to immutable releases. Floating tags are structurally
# forbidden by CLAUDE.md (T-0-07 / Watchtower auto-pull anti-pattern) and
# enforced by the verify-no-latest-in-workflows CI gate (Plan 02) and the
# .husky/pre-commit floating-tag guard (Plan 01).
#
# Bring up:   pnpm db:up
# Tear down:  pnpm db:down
# Bootstrap roles + db: pnpm db:setup-roles  (run once after first up)

services:
  postgres:
    image: postgres:16-alpine
    container_name: fb-eventos-postgres
    environment:
      POSTGRES_USER: fb_dev
      POSTGRES_PASSWORD: fb_dev
      POSTGRES_DB: fb_eventos_dev
    command: >
      postgres
        -c log_statement=all
        -c timezone=America/Sao_Paulo
        -c max_connections=100
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'fb_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: fb-eventos-minio
    command: server /data --console-address ':9001'
    environment:
      # Local dev creds — defaults match `mc alias` bootstrap in
      # scripts/minio/setup-buckets.sh. Production creds live in Coolify
      # env UI (see docker/coolify/minio.service.md). NEVER ship these
      # values to production.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # Coolify routes the browser-facing console through Traefik at this
      # subdomain in production. Default left blank for local dev — MinIO
      # serves the console at http://localhost:9001 in that case.
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      # `/minio/health/live` is the HTTP probe endpoint — simpler than the
      # `mc ready local` command which requires `mc` to be configured first.
      # 200 = service up; non-200 = unhealthy.
      test:
        - CMD-SHELL
        - 'wget -qO- http://localhost:9000/minio/health/live > /dev/null 2>&1 || exit 1'
      interval: 30s
      timeout: 5s
      retries: 3

  mailpit:
    image: axllent/mailpit:v1.20
    container_name: fb-eventos-mailpit
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  pg_data:
  minio_data:
