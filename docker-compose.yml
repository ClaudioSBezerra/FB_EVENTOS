# FB_EVENTOS — Coolify production stack (Phase 1 demo, Plan 07).
#
# Single-stack deploy: Coolify clones this repo and runs
# `docker compose up -d` to bring web + worker + postgres + minio
# online together. Mirrors the FB_APU04 docker-compose.prod.yml pattern.
#
# All ${VAR:-default} placeholders fall back to demo-safe defaults when
# Coolify env UI doesn't override them. The defaults match what the
# operator agreed on for the eventos.fbtax.cloud demo (passwords match
# the FB_APU04/FB_FAROL/FB_SMARTPICK convention of `postgres`). Production
# pilot deploy MUST override every password via Coolify env UI.
#
# DESIGN NOTES:
#   - Postgres + MinIO live in this compose (not as separate Coolify Resources)
#     so the demo deploy is a single button-click. For a real piloto promote
#     them to dedicated Coolify-managed databases for snapshot tooling +
#     zero-downtime failover.
#   - Image tags are pinned (no `:latest`) — contractual ban from CLAUDE.md.
#   - Web + worker share a single Dockerfile with multi-stage targets
#     (web-runner / worker-runner) to halve build memory vs separate files.
#   - Traefik labels live in the Coolify service UI (NOT in this file) so
#     the operator can swap host names without touching Git.

services:
  # ---------------------------------------------------------------------------
  # Next.js web — public-facing app server
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: web-runner
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
    restart: always
    ports:
      - "3000:3000"
    # Routing handled by Coolify auto-magic via SERVICE_FQDN_WEB +
    # SERVICE_URL_WEB env vars configured in the Coolify UI (operator
    # confirmed these are set in Application → Environment Variables).
    # Coolify generates the Traefik labels itself — our explicit labels
    # (tried in 9b454b7) were conflicting and producing 404. Removed.
    environment:

      # Database (NOBYPASSRLS runtime role). Password defaults match the
      # init script — Coolify UI should override only if it differs.
      DATABASE_URL: postgresql://fb_app_user:${FB_APP_PASSWORD:-postgres}@postgres:5432/fb_eventos_dev
      DATABASE_MIGRATOR_URL: postgresql://fb_migrator:${FB_MIGRATOR_PASSWORD:-postgres}@postgres:5432/fb_eventos_dev

      # Auth — Better Auth. Default secret is a fixed dev placeholder;
      # for any production-adjacent deploy generate `openssl rand -hex 32`.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-fb-eventos-demo-secret-replace-in-prod-please-32+chars}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://eventos.fbtax.cloud}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://eventos.fbtax.cloud}

      # SMTP (Hostinger). Defaults to host but no creds — set in Coolify UI.
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_FROM: ${SMTP_FROM:-FB_EVENTOS <no-reply@eventos.fbtax.cloud>}

      # MinIO — internal endpoint (web → minio inside this network)
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-fb-eventos}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-https://minio.eventos.fbtax.cloud}

      # Pagar.me (sandbox for demo)
      PAGARME_SECRET_KEY: ${PAGARME_SECRET_KEY:-sk_test_placeholder}
      PAGARME_ENV: ${PAGARME_ENV:-sandbox}
      PAGARME_WEBHOOK_USER: ${PAGARME_WEBHOOK_USER:-}
      PAGARME_WEBHOOK_PASS: ${PAGARME_WEBHOOK_PASS:-}
      PAGARME_WEBHOOK_SIGNING_SECRET: ${PAGARME_WEBHOOK_SIGNING_SECRET:-placeholder}

      # ZapSign (Phase 1 contratos)
      ZAPSIGN_TOKEN: ${ZAPSIGN_TOKEN:-}
      ZAPSIGN_ENV: ${ZAPSIGN_ENV:-sandbox}
      ZAPSIGN_WEBHOOK_USER: ${ZAPSIGN_WEBHOOK_USER:-}
      ZAPSIGN_WEBHOOK_PASS: ${ZAPSIGN_WEBHOOK_PASS:-}

      # Observability
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Runtime
      NODE_ENV: production
      TZ: America/Sao_Paulo
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # IMPORTANTE: 127.0.0.1 explícito, NÃO `localhost`.
      # Alpine resolve `localhost` para IPv6 (::1) primeiro, mas Next.js
      # standalone bind é só IPv4 (HOSTNAME=0.0.0.0). Resultado: healthcheck
      # com `localhost` recebe "Connection refused" mesmo com listener vivo
      # em 0.0.0.0:3000. Diagnosticado via /proc/net/tcp mostrando LISTEN
      # em 00000000:0BB8 enquanto `wget localhost:3000` recusava conexão.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Migrate — one-shot service that applies Drizzle migrations before web +
  # worker start. Reuses the worker-runner image (already has tsx + source).
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker-runner
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
    restart: "no"
    command: ["node_modules/.bin/tsx", "src/db/migrate.ts"]
    environment:
      DATABASE_MIGRATOR_URL: postgresql://fb_migrator:${FB_MIGRATOR_PASSWORD:-postgres}@postgres:5432/fb_eventos_dev
      MIGRATION_RUNTIME: "1"
      # Other env vars are unused by migrate.ts but required by env.ts validation
      DATABASE_URL: postgresql://fb_app_user:${FB_APP_PASSWORD:-postgres}@postgres:5432/fb_eventos_dev
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-fb-eventos-demo-secret-replace-in-prod-please-32+chars}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://eventos.fbtax.cloud}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://eventos.fbtax.cloud}
      NODE_ENV: production
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Graphile-Worker — background jobs (email send, outbox drain, reservation
  # expire, payment webhook processing). No HTTP listener.
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker-runner
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
    restart: always
    environment:
      DATABASE_URL: postgresql://fb_app_user:${FB_APP_PASSWORD:-postgres}@postgres:5432/fb_eventos_dev
      DATABASE_MIGRATOR_URL: postgresql://fb_migrator:${FB_MIGRATOR_PASSWORD:-postgres}@postgres:5432/fb_eventos_dev
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-fb-eventos-demo-secret-replace-in-prod-please-32+chars}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://eventos.fbtax.cloud}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://eventos.fbtax.cloud}
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_FROM: ${SMTP_FROM:-FB_EVENTOS <no-reply@eventos.fbtax.cloud>}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-fb-eventos}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-https://minio.eventos.fbtax.cloud}
      PAGARME_SECRET_KEY: ${PAGARME_SECRET_KEY:-sk_test_placeholder}
      PAGARME_ENV: ${PAGARME_ENV:-sandbox}
      PAGARME_WEBHOOK_SIGNING_SECRET: ${PAGARME_WEBHOOK_SIGNING_SECRET:-placeholder}
      ZAPSIGN_TOKEN: ${ZAPSIGN_TOKEN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — single source of truth (contractual ban on embedded DBs).
  # ---------------------------------------------------------------------------
  postgres:
    # Custom image extends postgres:16-alpine with init scripts baked in.
    # The previous bind-mount approach (./scripts/db/init:/docker-entrypoint-initdb.d:ro)
    # silently failed in Coolify build-from-Git deploys — Postgres logged
    # `ignoring /docker-entrypoint-initdb.d/*` (empty dir). See docker/Dockerfile.postgres.
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres}
      POSTGRES_DB: postgres
      # Forwarded into the init scripts (scripts/db/init/01-roles.sh) so
      # the role passwords come from Coolify env UI when set.
      FB_APP_PASSWORD: ${FB_APP_PASSWORD:-postgres}
      FB_MIGRATOR_PASSWORD: ${FB_MIGRATOR_PASSWORD:-postgres}
    command:
      - postgres
      - -c
      - timezone=America/Sao_Paulo
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
    volumes:
      - postgres_data_v4:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (planta PDF/JPG, vendor docs, contracts)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: always
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # MINIO_BROWSER_REDIRECT_URL intentionally NOT set in the compose default.
      # When MinIO can't validate the redirect URL (DNS not propagated yet) it
      # exits during startup. Set this in Coolify env UI ONLY AFTER you point
      # `minio.eventos.fbtax.cloud` DNS at the Coolify host AND the TLS cert
      # is provisioned by Traefik. For initial demo deploy leave unset and
      # access the console via http://<host-ip>:9001.
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_v2:/data
    # ---------------------------------------------------------------------------
    # Traefik labels (2026-06-16): Coolify's SERVICE_FQDN_<SERVICE> auto-magic
    # generated labels for `web` but NOT for `minio` in this stack — the
    # subdomain `minio.eventos.fbtax.cloud` ended up served by Traefik's default
    # self-signed cert (404/handshake unknown CA) because no router was bound
    # to that Host. Coolify-version-specific gap on beta.463.
    #
    # Explicit labels override the missing auto-magic: HTTP entrypoint redirects
    # to HTTPS, HTTPS entrypoint serves MinIO S3 API on port 9000 via Let's
    # Encrypt cert. The `redirect-to-https` middleware was declared globally by
    # the `web` service — we reuse it instead of redeclaring. Console (port
    # 9001) intentionally NOT exposed via Traefik; reach via host IP only when
    # operationally needed.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-http.entryPoints=http"
      - "traefik.http.routers.minio-http.middlewares=redirect-to-https"
      - "traefik.http.routers.minio-http.rule=Host(`minio.eventos.fbtax.cloud`)"
      - "traefik.http.routers.minio-https.entryPoints=https"
      - "traefik.http.routers.minio-https.rule=Host(`minio.eventos.fbtax.cloud`)"
      - "traefik.http.routers.minio-https.tls=true"
      - "traefik.http.routers.minio-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
    healthcheck:
      # Official MinIO docs healthcheck — /minio/health/live returns 200 once
      # the S3 API is accepting requests. start_period gives MinIO time to
      # initialize the volume + open ports before the first check (the
      # previous 30s/3-retry window was too tight on cold-start hosts).
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MinIO bootstrap — one-shot service that creates the default bucket
  # after MinIO is healthy.
  #
  # MinIO doesn't auto-create buckets from MINIO_DEFAULT_BUCKET (env var is
  # just a convention we use to plumb the same value to the web service).
  # Without this step, the first planta upload fails with "The specified
  # bucket does not exist" — reported 2026-06-17 prod incident, manually
  # fixed via `mc mb` then permanently fixed here.
  #
  # Uses the official MinIO Client (mc) image. `mc mb -p` is idempotent —
  # safe to run on every deploy.
  # ---------------------------------------------------------------------------
  minio-bootstrap:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-fb-eventos}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb -p local/\"$$MINIO_DEFAULT_BUCKET\" &&
      echo 'minio-bootstrap: bucket ready' &&
      mc ls local/
      "

volumes:
  postgres_data_v4:
  minio_data_v2:
